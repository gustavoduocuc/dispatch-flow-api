name: Docker Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests
        run: ./mvnw test

  build-and-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Prepare Oracle wallet for Docker build
        env:
          ORACLE_WALLET_BASE64: ${{ secrets.ORACLE_WALLET_BASE64 }}
        run: |
          mkdir -p wallet
          echo "$ORACLE_WALLET_BASE64" | base64 -d > wallet.zip
          unzip -o wallet.zip -d wallet

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ ! -f wallet/tnsnames.ora ]; then
            echo "wallet/tnsnames.ora no encontrado. Configure ORACLE_WALLET_BASE64 en GitHub Secrets." >&2
            exit 1
          fi
          docker build -t "${DOCKERHUB_USERNAME}/dispatch-flow-api:latest" .
          docker push "${DOCKERHUB_USERNAME}/dispatch-flow-api:latest"

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          USER_SERVER: ${{ secrets.USER_SERVER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

          DATASOURCE_URL="${SPRING_DATASOURCE_URL:-jdbc:oracle:thin:@dispatchflowdb_high}"
          EFS_HOST_MOUNT="${EFS_HOST_MOUNT:-/mnt/dispatch-flow-efs}"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem "${USER_SERVER}@${EC2_HOST}" \
            "docker pull ${DOCKERHUB_USERNAME}/dispatch-flow-api:latest && \
             docker stop dispatch-flow-api 2>/dev/null || true && \
             docker rm dispatch-flow-api 2>/dev/null || true && \
             docker run -d --name dispatch-flow-api -p 8080:8080 \
               -v ${EFS_HOST_MOUNT}:/app/efs \
               -e SPRING_PROFILES_ACTIVE=prod \
               -e SPRING_DATASOURCE_URL='${DATASOURCE_URL}' \
               -e SPRING_DATASOURCE_USERNAME='${SPRING_DATASOURCE_USERNAME}' \
               -e SPRING_DATASOURCE_PASSWORD='${SPRING_DATASOURCE_PASSWORD}' \
               -e TNS_ADMIN=/app/wallet \
               -e AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}' \
               -e AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}' \
               -e AWS_SESSION_TOKEN='${AWS_SESSION_TOKEN}' \
               -e AWS_REGION='${AWS_REGION}' \
               -e S3_BUCKET_NAME='${S3_BUCKET_NAME}' \
               -e EFS_BASE_PATH=/app/efs \
               ${DOCKERHUB_USERNAME}/dispatch-flow-api:latest"
