spring.application.name=dispatch-flow-api

spring.datasource.url=jdbc:h2:mem:dispatchflow
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

efs.base-path=${EFS_BASE_PATH:./tmp/efs}

dispatch.storage.s3.enabled=${DISPATCH_STORAGE_S3_ENABLED:true}
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${S3_BUCKET_NAME:dispatch-flow-local}
aws.s3.endpoint=${AWS_S3_ENDPOINT:}
aws.s3.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.session-token=${AWS_SESSION_TOKEN:}
aws.s3.region=${AWS_REGION:us-east-1}
